<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatshooters - Red Táctica en la Nube</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chatshooters">
    <link class="icon-app" rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/545/545241.png">

    <style>
        :root {
            --bg-principal: #0b0f12;
            --bg-panel: #13191e;
            --bg-chat-activo: #1c252c;
            --verde-neon: #00ff66;
            --verde-tenue: rgba(0, 255, 102, 0.1);
            --rojo-panico: #ff3366;
            --texto-blanco: #ffffff;
            --texto-gris: #8a99a5;
            --borde: #222d36;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-principal); color: var(--texto-blanco); height: 100vh; width: 100vw; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .pantalla { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; background-color: var(--bg-principal); justify-content: center; align-items: center; }
        .card-auth { background-color: var(--bg-panel); border: 1px solid var(--borde); border-radius: 16px; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-titulo { font-size: 2rem; font-weight: 900; letter-spacing: 2px; color: var(--verde-neon); margin-bottom: 20px; text-transform: uppercase; }
        .instruccion { color: var(--texto-gris); font-size: 0.9rem; margin-bottom: 25px; }
        .grupo-input { text-align: left; margin-bottom: 18px; }
        .grupo-input label { display: block; font-size: 0.8rem; color: var(--texto-gris); margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }
        .input-text { width: 100%; background-color: var(--bg-principal); border: 1px solid var(--borde); border-radius: 8px; padding: 12px; color: white; outline: none; font-size: 1rem; }
        .btn-accion { width: 100%; background-color: var(--verde-neon); color: var(--bg-principal); border: none; border-radius: 8px; padding: 14px; font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; display: block; }
        
        .app-container { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 320px; background-color: var(--bg-panel); border-right: 1px solid var(--borde); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px 20px; border-bottom: 1px solid var(--borde); display: flex; flex-direction: column; gap: 12px; }
        .perfil-usuario-box { display: flex; align-items: center; gap: 12px; padding-bottom: 5px; }
        .avatar-editable { width: 45px; height: 45px; border-radius: 50%; background-color: var(--borde); display: flex; align-items: center; justify-content: center; color: var(--verde-neon); font-weight: bold; cursor: pointer; overflow: hidden; border: 2px solid var(--borde); position: relative;}
        .avatar-editable img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-editable:hover::after { content: "✏️"; position: absolute; background: rgba(0,0,0,0.6); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        
        .sidebar-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .btn-add-amigo { width: 100%; background-color: transparent; border: 1px dashed var(--verde-neon); color: var(--verde-neon); padding: 12px 8px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(34, 45, 54, 0.3); width: 100%; cursor: pointer; }
        .chat-item.active { background-color: var(--bg-chat-activo); border-left: 3px solid var(--verde-neon); }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--borde); margin-right: 12px; display: flex; align-items: center; justify-content: center; color: var(--verde-neon); font-weight: bold; text-transform: uppercase; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .chat-window { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-principal); }
        .chat-header { height: 70px; background-color: var(--bg-panel); border-bottom: 1px solid var(--borde); display: flex; align-items: center; padding: 0 20px; gap: 12px; justify-content: space-between; }
        .chat-header-info { display: flex; align-items: center; gap: 12px; }
        .btn-eliminar-chat { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--texto-gris); padding: 8px; border-radius: 50%; display: none; transition: background 0.2s, color 0.2s; }
        .btn-eliminar-chat:hover { background-color: rgba(255, 51, 102, 0.15); color: var(--rojo-panico); }

        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 65%; display: flex; flex-direction: column; }
        .message.received { align-self: flex-start; }
        .message.sent { align-self: flex-end; }
        .message-bubble { padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .received .message-bubble { background-color: var(--bg-panel); border: 1px solid var(--borde); }
        .sent .message-bubble { background-color: var(--verde-tenue); border: 1px solid rgba(0,255,102,0.3); }
        
        .img-adjunta { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 5px; cursor: pointer; display: block; }
        
        .input-area { padding: 15px 20px; background-color: var(--bg-panel); border-top: 1px solid var(--borde); display: flex; gap: 10px; align-items: center; position: relative; }
        .input-textarea { flex: 1; background-color: var(--bg-principal); border: 1px solid var(--borde); border-radius: 8px; padding: 12px; color: white; outline: none; font-size: 1rem; height: 45px; resize: none; }
        
        .btn-emoji, .btn-audio, .btn-camara { background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; color: var(--texto-gris); }
        .btn-audio.grabando { color: var(--rojo-panico); animation: parpadeo 1s infinite; }
        
        @keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .emoji-picker { display: none; position: absolute; bottom: 75px; left: 20px; background-color: var(--bg-panel); border: 1px solid var(--borde); border-radius: 8px; padding: 10px; grid-template-columns: repeat(5, 1fr); gap: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100; }
        .emoji-option { font-size: 1.3rem; cursor: pointer; border: none; background: none; }
        
        .btn-enviar { background: var(--verde-neon); color: black; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; height: 45px; }
        .alerta-coaccion { display: none; background-color: rgba(255, 51, 102, 0.15); border: 1px solid var(--rojo-panico); color: var(--rojo-panico); padding: 10px; font-size: 0.8rem; border-radius: 6px; text-align: center; margin-bottom: 15px; font-weight: bold;}
        
        audio { max-width: 100%; margin-top: 5px; border-radius: 4px; }
        input[type="file"] { display: none; }

        @media (max-width: 768px) {
            .sidebar { width: 40%; min-width: 140px; }
            .btn-add-amigo { font-size: 0.75rem; padding: 12px 4px; }
            .chat-item { padding: 12px 10px; }
            .avatar { margin-right: 6px; width: 35px; height: 35px; }
            .chat-header { padding: 0 12px; }
            .messages-container { padding: 12px; }
            .message { max-width: 85%; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <input type="file" id="file-avatar" accept="image/*" onchange="subirAvatar(this)">
    <input type="file" id="file-foto" accept="image/*" onchange="subirFotoChat(this)">

    <!-- REGISTRO -->
    <div id="pantalla-registro" class="pantalla" style="display: flex;">
        <div class="card-auth">
            <div class="logo-titulo">Chatshooters</div>
            <p class="instruccion">Inicializar Identidad Sincronizada en la Nube</p>
            <div class="grupo-input">
                <label>Tu Indicador / Nombre de Usuario</label>
                <input type="text" id="reg-usuario" class="input-text" placeholder="Ej: Anthony">
            </div>
            <div class="grupo-input">
                <label>PIN Maestro (Acceso Real)</label>
                <input type="text" id="reg-pin-maestro" class="input-text" maxlength="4" value="1234">
            </div>
            <div class="grupo-input">
                <label style="color: var(--rojo-panico);">PIN Coacción (Acceso Señuelo)</label>
                <input type="text" id="reg-pin-panico" class="input-text" maxlength="4" value="9999">
            </div>
            <button class="btn-accion" onclick="procesarRegistro()">Vincular Terminal Nube</button>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="pantalla-login" class="pantalla">
        <div class="card-auth">
            <div class="logo-titulo">Chatshooters</div>
            <p class="instruccion">Inserte PIN de descifrado global.</p>
            <div id="aviso-panico-activo" class="alerta-coaccion">⚠️ MODO DE DESTRUCCIÓN SILENCIOSA ACTIVO</div>
            <div class="grupo-input">
                <input type="password" id="login-pin" class="input-text" maxlength="4" style="text-align: center; font-size: 1.5rem; letter-spacing: 10px;">
            </div>
            <button class="btn-accion" onclick="procesarLogin()">Acceder</button>
        </div>
    </div>

    <!-- ENTORNO CHAT -->
    <div id="pantalla-chats" class="pantalla">
        <div class="app-container">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="perfil-usuario-box">
                        <div class="avatar-editable" id="mi-avatar-visual" onclick="document.getElementById('file-avatar').click()">A</div>
                        <div style="display: flex; flex-direction: column;">
                            <span id="mi-identificador" style="font-weight: bold; font-size: 1.1rem;">Usuario</span>
                            <span style="font-size: 0.75rem; color: var(--verde-neon); letter-spacing: 1px;">TERMINAL SECURE</span>
                        </div>
                    </div>
                    <div class="sidebar-top">
                        <div id="app-logo" style="font-weight: 800; color: var(--verde-neon); letter-spacing: 1px;">CHATSHOOTERS</div>
                    </div>
                    <button class="btn-add-amigo" id="btn-add-amigo" onclick="agregarAmigo()">+ Agregar Amigo</button>
                </div>
                <div class="chat-list" id="contenedor-canales"></div>
            </aside>
            <main class="chat-window">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div class="avatar" id="avatar-chat-activo-cabecera" style="display: none;"></div>
                        <h4 id="nombre-chat-activo">Selecciona un canal</h4>
                    </div>
                    <button id="btn-eliminar-conversacion" class="btn-eliminar-chat" title="Destruir Conversación" onclick="eliminarConversacionActiva()">🗑️</button>
                </div>
                <div class="messages-container" id="mensajes-chat"></div>
                <div class="input-area">
                    <button class="btn-emoji" onclick="alternarEmojiPicker()">😀</button>
                    <button class="btn-camara" onclick="document.getElementById('file-foto').click()">📷</button>
                    
                    <div class="emoji-picker" id="picker-emojis">
                        <button class="emoji-option" onclick="insertarEmoji('👍')">👍</button>
                        <button class="emoji-option" onclick="insertarEmoji('✔️')">✔️</button>
                        <button class="emoji-option" onclick="insertarEmoji('🔥')">🔥</button>
                        <button class="emoji-option" onclick="insertarEmoji('👽')">👽</button>
                        <button class="emoji-option" onclick="insertarEmoji('🚨')">🚨</button>
                        <button class="emoji-option" onclick="insertarEmoji('💀')">💀</button>
                        <button class="emoji-option" onclick="insertarEmoji('😂')">😂</button>
                        <button class="emoji-option" onclick="insertarEmoji('❤️')">❤️</button>
                    </div>
                    
                    <textarea id="input-mensaje" class="input-textarea" placeholder="Escribir..."></textarea>
                    <button class="btn-audio" id="btn-microfono" onclick="alternarGrabacion()">🎤</button>
                    <button class="btn-enviar" onclick="enviarMensaje()">ENVIAR</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDoeAo6FTBid6Eq_PerCg_I955jD4iFw_4",
            databaseURL: "https://chatshooters-e4a81-default-rtdb.europe-west1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        var miUsuario = "";
        var PIN_M = "1234";
        var PIN_P = "9999";
        var modoSeñuelo = false;
        var chatSeleccionado = "";
        
        var mediaRecorder;
        var fragmentosAudio = [];
        var grabacionActiva = false;
        var baseDatosAvatares = {};
        var audioCtx;
        var swRegistration = null;

        // Registro de SW y comunicación táctica
        window.addEventListener('load', function() {
            if ("Notification" in window) { 
                Notification.requestPermission(); 
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => { 
                    swRegistration = reg;
                    sincronizarUsuarioConSW();
                });
            }
        });

        // Informa al Service Worker quién eres para que te vigile en segundo plano
        function sincronizarUsuarioConSW() {
            if (navigator.serviceWorker.controller && miUsuario) {
                navigator.serviceWorker.controller.postMessage({
                    tipo: 'SET_PERFIL',
                    usuario: miUsuario,
                    modoSeñuelo: modoSeñuelo
                });
            }
        }

        function reproducirSonidoAlerta() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } catch (e) { console.log(e); }
        }

        window.addEventListener('load', function() {
            var usuarioGuardado = localStorage.getItem('cs_usuario');
            var pinM_Guardado = localStorage.getItem('cs_pin_m');
            var pinP_Guardado = localStorage.getItem('cs_pin_p');
            var modoGuardado = localStorage.getItem('cs_modo');

            if (usuarioGuardado && pinM_Guardado) {
                miUsuario = usuarioGuardado;
                PIN_M = pinM_Guardado;
                PIN_P = pinP_Guardado || "9999";
                modoSeñuelo = (modoGuardado === 'true');

                configurarInterfaz(modoSeñuelo ? "MESSENGER" : "CHATSHOOTERS", modoSeñuelo ? "#00bcff" : "var(--verde-neon)", modoSeñuelo ? "block" : "none", modoSeñuelo ? "+ Buscar Amigo" : "+ Agregar Amigo");
                document.getElementById('mi-identificador').innerText = miUsuario;
                mostrarPantalla('pantalla-chats');

                setTimeout(function() {
                    sincronizarUsuarioConSW();
                    escucharAvataresGlobales();
                    escucharAmigosYMensajes();
                }, 200);
            }
        });

        function mostrarPantalla(id) {
            document.getElementById('pantalla-registro').style.display = 'none';
            document.getElementById('pantalla-login').style.display = 'none';
            document.getElementById('pantalla-chats').style.display = 'none';
            var pantalla = document.getElementById(id);
            if (pantalla) pantalla.style.display = 'flex';
        }

        function procesarRegistro() {
            var usuarioInput = document.getElementById('reg-usuario');
            if (!usuarioInput) return;
            miUsuario = usuarioInput.value.trim();
            if(!miUsuario) return;
            PIN_M = document.getElementById('reg-pin-maestro').value || "1234";
            PIN_P = document.getElementById('reg-pin-panico').value || "9999";
            mostrarPantalla('pantalla-login');
        }

        function procesarLogin() {
            var pin = document.getElementById('login-pin').value;
            if(pin === PIN_M) {
                modoSeñuelo = false;
                configurarInterfaz("CHATSHOOTERS", "var(--verde-neon)", "none", "+ Agregar Amigo");
            } else if(pin === PIN_P) {
                modoSeñuelo = true;
                configurarInterfaz("MESSENGER", "#00bcff", "block", "+ Buscar Amigo");
            } else { alert("Invalido"); return; }
            
            localStorage.setItem('cs_usuario', miUsuario);
            localStorage.setItem('cs_pin_m', PIN_M);
            localStorage.setItem('cs_pin_p', PIN_P);
            localStorage.setItem('cs_modo', modoSeñuelo);

            document.getElementById('mi-identificador').innerText = miUsuario;
            mostrarPantalla('pantalla-chats');

            sincronizarUsuarioConSW();
            escucharAvataresGlobales();
            escucharAmigosYMensajes();
        }

        function configurarInterfaz(titulo, color, displayPanico, textoBoton) {
            document.getElementById('aviso-panico-activo').style.display = displayPanico;
            document.getElementById('app-logo').innerText = titulo;
            document.getElementById('app-logo').style.color = color;
            document.getElementById('btn-add-amigo').style.borderColor = color;
            document.getElementById('btn-add-amigo').style.color = color;
            document.getElementById('btn-add-amigo').innerText = textoBoton;
        }

        function escucharAvataresGlobales() {
            database.ref('avatares').on('value', function(snapshot) {
                if(snapshot.exists()) {
                    baseDatosAvatares = snapshot.val();
                    if(baseDatosAvatares[miUsuario]) document.getElementById('mi-avatar-visual').innerHTML = '<img src="'+baseDatosAvatares[miUsuario]+'">';
                }
            });
        }

        function subirAvatar(input) {
            if (!input.files || !input.files[0]) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image(); img.src = e.target.result;
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    canvas.width = 120; canvas.height = 120;
                    canvas.getContext('2d').drawImage(img, 0, 0, 120, 120);
                    database.ref('avatares/' + miUsuario).set(canvas.toDataURL('image/jpeg', 0.7));
                }
            }
            reader.readAsDataURL(input.files[0]);
        }

        function agregarAmigo() {
            var amigo = prompt("Amigo:"); if(!amigo) return;
            var path = modoSeñuelo ? "coaccion" : "real";
            database.ref('usuarios/' + miUsuario + '/' + path + '/' + amigo).set(true);
            database.ref('usuarios/' + amigo + '/' + path + '/' + miUsuario).set(true);
        }

        var amigosEscuchados = {};
        function escucharAmigosYMensajes() {
            var path = modoSeñuelo ? "coaccion" : "real";
            database.ref('usuarios/' + miUsuario + '/' + path).on('value', function(snapshot) {
                var contenedor = document.getElementById('contenedor-canales');
                contenedor.innerHTML = "";
                if(snapshot.exists()) {
                    Object.keys(snapshot.val()).forEach(function(key) {
                        if(key === "init") return;
                        var item = document.createElement('div');
                        item.className = "chat-item" + (chatSeleccionado === key ? " active" : "");
                        item.onclick = function() { seleccionarChat(key); };
                        
                        var avBox = document.createElement('div'); avBox.className = "avatar";
                        avBox.innerText = key[0].toUpperCase();
                        
                        var nameSpan = document.createElement('span'); nameSpan.innerText = key;
                        item.appendChild(avBox); item.appendChild(nameSpan);
                        contenedor.appendChild(item);
                        
                        if(!amigosEscuchados[key]) {
                            amigosEscuchados[key] = true;
                            escucharMensajesDeChat(key);
                        }
                    });
                }
            });
        }

        function seleccionarChat(amigo) {
            chatSeleccionado = amigo;
            document.getElementById('nombre-chat-activo').innerText = amigo;
            document.getElementById('btn-eliminar-conversacion').style.display = "block";
            renderizarMensajes(amigo);
        }

        var historialMensajesGlobales = {};
        function escucharMensajesDeChat(amigo) {
            var ID_CONV = [miUsuario, amigo].sort().join("_");
            var path = modoSeñuelo ? "coaccion" : "real";
            
            database.ref('chats/' + path + '/' + ID_CONV).on('value', function(snapshot) {
                var dataVal = snapshot.val() || {};
                historialMensajesGlobales[amigo] = dataVal;
                
                // Si la app está abierta en primer plano, reproducimos el sonido controlado
                if(chatSeleccionado === amigo && !document.hidden) {
                    renderizarMensajes(amigo);
                }
            });
        }

        function renderizarMensajes(amigo) {
            var contenedor = document.getElementById('mensajes-chat');
            contenedor.innerHTML = "";
            var datos = historialMensajesGlobales[amigo] || {};
            Object.keys(datos).forEach(function(msgId) {
                var msg = datos[msgId];
                var msgDiv = document.createElement('div');
                msgDiv.className = "message " + (msg.emisor === miUsuario ? "sent" : "received");
                var bubble = document.createElement('div'); bubble.className = "message-bubble";
                bubble.innerText = msg.contenido;
                msgDiv.appendChild(bubble); contenedor.appendChild(msgDiv);
            });
            contenedor.scrollTop = contenedor.scrollHeight;
        }

        function enviarMensaje() {
            var input = document.getElementById('input-mensaje');
            var texto = input.value.trim(); if(!texto || !chatSeleccionado) return;
            
            var ID_CONV = [miUsuario, chatSeleccionado].sort().join("_");
            var path = modoSeñuelo ? "coaccion" : "real";
            database.ref('chats/' + path + '/' + ID_CONV).push({
                emisor: miUsuario,
                tipo: "texto",
                contenido: texto,
                timestamp: Date.now()
            });
            input.value = "";
        }
    </script>
</body>
</html>
